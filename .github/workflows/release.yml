name: Enterprise Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.4"
  WEB_URL: ${{ vars.WEB_URL || secrets.WEB_URL || 'https://stately-sawine-1efd4d.netlify.app' }}

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js web
        run: pnpm run build

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apk

          apk_source="android/app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${apk_source}" ]]; then
            apk_source="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi

          if [[ ! -f "${apk_source}" ]]; then
            echo "Android release APK was not generated." >&2
            exit 1
          fi

          cp "${apk_source}" "apk/ai-knowledge-chat-latest.apk"

          if [[ ! -s "apk/ai-knowledge-chat-latest.apk" ]]; then
            echo "Collected Android APK is empty or missing." >&2
            exit 1
          fi

          ls -lh "apk/ai-knowledge-chat-latest.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: apk/*.apk
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: build-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare "pnpm@$env:PNPM_VERSION" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build EXE
        run: pnpm exec electron-builder --win --publish never

      - name: Collect EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "exe" | Out-Null

          $exe = Get-ChildItem -Path "dist", "dist-app" -Recurse -File -Filter "*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch "\\resources\\elevate\.exe$" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $exe) {
            throw "Windows EXE was not generated."
          }

          Copy-Item -LiteralPath $exe.FullName -Destination "exe/ai-knowledge-chat-latest.exe" -Force

          $collected = Get-Item -LiteralPath "exe/ai-knowledge-chat-latest.exe"
          if ($collected.Length -le 0) {
            throw "Collected Windows EXE is empty or missing."
          }

          Write-Host "EXE asset: $($collected.FullName) ($($collected.Length) bytes)"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: exe/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android-apk
      - build-windows-exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe
          path: exe

      - name: Verify APK and EXE assets
        shell: bash
        run: |
          set -euo pipefail

          apk_file="$(find apk -type f -name '*.apk' | sort | head -n 1)"
          exe_file="$(find exe -type f -name '*.exe' | sort | head -n 1)"

          if [[ -z "${apk_file}" || ! -s "${apk_file}" ]]; then
            echo "Android APK artifact is missing. The release cannot continue." >&2
            exit 1
          fi

          if [[ -z "${exe_file}" || ! -s "${exe_file}" ]]; then
            echo "Windows EXE artifact is missing. The release cannot continue." >&2
            exit 1
          fi

          echo "APK_FILE=${apk_file}" >> "${GITHUB_ENV}"
          echo "EXE_FILE=${exe_file}" >> "${GITHUB_ENV}"
          echo "APK_ASSET=$(basename "${apk_file}")" >> "${GITHUB_ENV}"
          echo "EXE_ASSET=$(basename "${exe_file}")" >> "${GITHUB_ENV}"

          echo "APK asset: ${apk_file}"
          echo "EXE asset: ${exe_file}"

      - name: Compute release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="ci-${GITHUB_RUN_NUMBER}"
          fi

          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Generate latest.json
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const releaseTag = process.env.RELEASE_TAG;
          const repo = process.env.GITHUB_REPOSITORY;
          const version = process.env.GITHUB_REF_NAME;
          const build = Number(process.env.GITHUB_RUN_NUMBER);
          const webUrl = process.env.WEB_URL;
          const updatedAt = new Date().toISOString();
          const apkAsset = process.env.APK_ASSET;
          const exeAsset = process.env.EXE_ASSET;

          if (!releaseTag || !repo || !version || !Number.isFinite(build) || !apkAsset || !exeAsset) {
            throw new Error("Release metadata is incomplete.");
          }

          const releaseBase = `https://github.com/${repo}/releases/download/${encodeURIComponent(releaseTag)}`;
          const manifest = {
            version,
            build,
            apk_url: `${releaseBase}/${encodeURIComponent(apkAsset)}`,
            exe_url: `${releaseBase}/${encodeURIComponent(exeAsset)}`,
            web_url: webUrl,
            updated_at: updatedAt
          };

          fs.mkdirSync("public/releases", { recursive: true });
          const latestJson = `${JSON.stringify(manifest, null, 2)}\n`;
          fs.writeFileSync("public/releases/latest.json", latestJson, "utf8");
          JSON.parse(fs.readFileSync("public/releases/latest.json", "utf8"));
          NODE

      - name: Create release notes
        run: |
          cat > release-notes.md <<EOF
          Auto CI/CD Release

          Version: ${GITHUB_REF_NAME}
          Build: ${GITHUB_RUN_NUMBER}

          APK and EXE are generated by independent jobs and uploaded together.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Release ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "Release ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi

      - name: Upload APK, EXE, and latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "${APK_FILE}" \
            "${EXE_FILE}" \
            public/releases/latest.json \
            --clobber
