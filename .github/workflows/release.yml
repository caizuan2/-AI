name: Enterprise Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.4"
  WEB_URL: ${{ vars.WEB_URL || secrets.WEB_URL || 'https://stately-sawine-1efd4d.netlify.app' }}

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Load version
        run: node scripts/sync-version.mjs --env

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js web
        run: pnpm run build

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Load version
        run: node scripts/sync-version.mjs --env

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure stable Android release keystore
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_CERT_SHA256: ${{ secrets.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail

          for secret_name in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_KEYSTORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD \
            ANDROID_RELEASE_CERT_SHA256; do
            if [[ -z "${!secret_name}" ]]; then
              echo "${secret_name} is not configured." >&2
              exit 1
            fi
          done

          keystore_file="${RUNNER_TEMP}/ai-knowledge-release.keystore"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_file}"
          chmod 600 "${keystore_file}"

          if [[ ! -s "${keystore_file}" ]]; then
            echo "Android release keystore is empty or missing." >&2
            exit 1
          fi

          keytool -list \
            -keystore "${keystore_file}" \
            -storepass "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" \
            -alias "${ANDROID_RELEASE_KEY_ALIAS}"

          echo "ANDROID_RELEASE_KEYSTORE_PATH=${keystore_file}" >> "${GITHUB_ENV}"

      - name: Build APK
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          pnpm run apk:build -- \
            -PVERSION="${VERSION}" \
            -PBUILD="${BUILD}" \
            -Pandroid.injected.signing.store.file="${ANDROID_RELEASE_KEYSTORE_PATH}" \
            -Pandroid.injected.signing.store.password="${ANDROID_RELEASE_KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${ANDROID_RELEASE_KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${ANDROID_RELEASE_KEY_PASSWORD}"

      - name: Verify signed APK
        shell: bash
        env:
          ANDROID_RELEASE_CERT_SHA256: ${{ secrets.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail

          signed_apk="android/app/build/outputs/apk/release/app-release.apk"

          if [[ ! -f "${signed_apk}" ]]; then
            echo "Signed release APK was not generated: ${signed_apk}" >&2
            exit 1
          fi

          apksigner="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" ]]; then
            echo "apksigner was not found in ANDROID_HOME." >&2
            exit 1
          fi

          echo "Checking APK signature..."
          "${apksigner}" verify --verbose "${signed_apk}"

          echo "Checking APK certificate..."
          keytool -printcert -jarfile "${signed_apk}" || true
          certificate_output="$("${apksigner}" verify --print-certs --verbose "${signed_apk}")"
          printf '%s\n' "${certificate_output}"

          actual_certificate="$(printf '%s\n' "${certificate_output}" | awk -F': ' '/certificate SHA-256 digest:/ { print $NF; exit }' | tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]')"
          expected_certificate="$(printf '%s' "${ANDROID_RELEASE_CERT_SHA256}" | tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]')"

          if [[ -z "${actual_certificate}" || "${actual_certificate}" != "${expected_certificate}" ]]; then
            echo "APK certificate mismatch: expected ${expected_certificate}, got ${actual_certificate:-missing}." >&2
            exit 1
          fi

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apk

          apk_source="android/app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${apk_source}" ]]; then
            echo "Signed Android release APK was not generated." >&2
            exit 1
          fi

          cp "${apk_source}" "apk/ai-knowledge-chat-latest.apk"

          if [[ ! -s "apk/ai-knowledge-chat-latest.apk" ]]; then
            echo "Collected Android APK is empty or missing." >&2
            exit 1
          fi

          ls -lh "apk/ai-knowledge-chat-latest.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: apk/*.apk
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: build-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Load version
        run: node scripts/sync-version.mjs --env

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare "pnpm@$env:PNPM_VERSION" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build EXE
        shell: pwsh
        run: pnpm run app:windows

      - name: Collect EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "exe" | Out-Null

          $exe = Get-Item -LiteralPath "dist-app/windows/ai-knowledge-chat.exe" -ErrorAction SilentlyContinue

          if (-not $exe) {
            throw "Windows EXE was not generated."
          }

          Copy-Item -LiteralPath $exe.FullName -Destination "exe/ai-knowledge-chat-latest.exe" -Force

          $collected = Get-Item -LiteralPath "exe/ai-knowledge-chat-latest.exe"
          if ($collected.Length -le 0) {
            throw "Collected Windows EXE is empty or missing."
          }

          Write-Host "EXE asset: $($collected.FullName) ($($collected.Length) bytes)"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: exe/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android-apk
      - build-windows-exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Load version
        run: node scripts/sync-version.mjs --env

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe
          path: exe

      - name: Verify APK and EXE assets
        shell: bash
        env:
          ANDROID_RELEASE_CERT_SHA256: ${{ secrets.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail

          apk_file="$(find apk -type f -name '*.apk' | sort | head -n 1)"
          exe_file="$(find exe -type f -name '*.exe' | sort | head -n 1)"

          if [[ -z "${apk_file}" || ! -s "${apk_file}" ]]; then
            echo "Android APK artifact is missing. The release cannot continue." >&2
            exit 1
          fi

          if [[ -z "${exe_file}" || ! -s "${exe_file}" ]]; then
            echo "Windows EXE artifact is missing. The release cannot continue." >&2
            exit 1
          fi

          if [[ -z "${ANDROID_HOME:-}" ]]; then
            echo "ANDROID_HOME is not set. Cannot verify APK signature before release upload." >&2
            exit 1
          fi

          apksigner="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" ]]; then
            echo "apksigner was not found in ANDROID_HOME." >&2
            exit 1
          fi

          echo "Checking APK signature..."
          "${apksigner}" verify --verbose "${apk_file}"

          echo "Checking APK certificate..."
          keytool -printcert -jarfile "${apk_file}" || true
          certificate_output="$("${apksigner}" verify --print-certs --verbose "${apk_file}")"
          printf '%s\n' "${certificate_output}"

          actual_certificate="$(printf '%s\n' "${certificate_output}" | awk -F': ' '/certificate SHA-256 digest:/ { print $NF; exit }' | tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]')"
          expected_certificate="$(printf '%s' "${ANDROID_RELEASE_CERT_SHA256}" | tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]')"

          if [[ -z "${expected_certificate}" ]]; then
            echo "ANDROID_RELEASE_CERT_SHA256 is not configured." >&2
            exit 1
          fi

          if [[ -z "${actual_certificate}" || "${actual_certificate}" != "${expected_certificate}" ]]; then
            echo "Published APK certificate mismatch: expected ${expected_certificate}, got ${actual_certificate:-missing}." >&2
            exit 1
          fi

          echo "APK_FILE=${apk_file}" >> "${GITHUB_ENV}"
          echo "EXE_FILE=${exe_file}" >> "${GITHUB_ENV}"
          echo "APK_ASSET=$(basename "${apk_file}")" >> "${GITHUB_ENV}"
          echo "EXE_ASSET=$(basename "${exe_file}")" >> "${GITHUB_ENV}"

          echo "APK asset: ${apk_file}"
          echo "EXE asset: ${exe_file}"

      - name: Validate version ref
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${VERSION}" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version.json version ${VERSION}." >&2
            exit 1
          fi

      - name: Generate latest.json
        run: node scripts/generate-latest-manifest.mjs --release

      - name: Create release notes
        run: |
          cat > release-notes.md <<EOF
          Auto CI/CD Release

          Version: ${VERSION}
          Build: ${BUILD}

          APK and EXE are generated by independent jobs and uploaded together.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Release ${VERSION}" \
              --notes-file release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "Release ${VERSION}" \
              --notes-file release-notes.md
          fi

      - name: Upload APK, EXE, and latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "${APK_FILE}" \
            "${EXE_FILE}" \
            public/releases/latest.json \
            --clobber
