import groovy.json.JsonSlurper

apply plugin: 'com.android.application'

def versionFile = file("../../version.json")
def versionConfig = versionFile.exists() ? new JsonSlurper().parse(versionFile) : [version: "0.0.0", build: 1]
def appVersionName = (
    project.findProperty("VERSION")
        ?: project.findProperty("APP_VERSION")
        ?: System.getenv("VERSION")
        ?: System.getenv("APP_VERSION")
        ?: versionConfig.version
).toString()
def appVersionCode = (
    project.findProperty("BUILD")
        ?: project.findProperty("APP_BUILD")
        ?: System.getenv("BUILD")
        ?: System.getenv("APP_BUILD")
        ?: versionConfig.build
).toString().toInteger()
def releaseKeystorePath = System.getenv("KEYSTORE_PATH") ?: System.getenv("ANDROID_KEYSTORE_PATH")
def releaseKeystorePassword = System.getenv("KEYSTORE_PASSWORD") ?: System.getenv("ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = System.getenv("KEY_ALIAS") ?: System.getenv("ANDROID_KEY_ALIAS")
def releaseKeyPassword = System.getenv("KEY_PASSWORD") ?: System.getenv("ANDROID_KEY_PASSWORD")
def hasReleaseSigning = releaseKeystorePath
    && releaseKeystorePassword
    && releaseKeyAlias
    && releaseKeyPassword
    && file(releaseKeystorePath).exists()

android {
    namespace = "com.aiknowledge.chat"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.aiknowledge.chat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        buildConfig true
    }
}

gradle.taskGraph.whenReady { graph ->
    def releaseTasks = [
        ":app:assembleRelease",
        "assembleRelease",
        ":app:bundleRelease",
        "bundleRelease"
    ]
    def isReleaseBuild = releaseTasks.any { taskName -> graph.hasTask(taskName) }

    if (isReleaseBuild && !hasReleaseSigning) {
        throw new GradleException("Release APK signing requires KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD. KEYSTORE_PATH must point to an existing keystore file.")
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
