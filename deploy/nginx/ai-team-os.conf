map $http_upgrade $ai_team_os_connection_upgrade {
  default upgrade;
  "" close;
}

limit_req_zone $binary_remote_addr zone=ai_team_os_api:10m rate=20r/s;

# Log the normalized URI only. $request_uri is intentionally excluded because
# its query string can contain enterprise identifiers or other sensitive data.
log_format ai_team_os '$remote_addr - $request_id [$time_local] '
                      '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                      '"$http_user_agent"';

upstream ai_team_os_backend {
  server 127.0.0.1:3022;
  keepalive 32;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  return 444;
}

server {
  listen 80;
  listen [::]:80;
  server_name team-os.example.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://team-os.example.com$request_uri;
  }
}

server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  server_name _;

  ssl_certificate /etc/ai-team-os/tls/fullchain.pem;
  ssl_certificate_key /etc/ai-team-os/tls/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  return 444;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name team-os.example.com;

  ssl_certificate /etc/ai-team-os/tls/fullchain.pem;
  ssl_certificate_key /etc/ai-team-os/tls/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:AI_TEAM_OS_SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  client_max_body_size 25m;
  keepalive_timeout 65;
  access_log /var/log/nginx/ai-team-os.access.log ai_team_os;
  error_log /var/log/nginx/ai-team-os.error.log warn;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types application/json application/javascript application/xml image/svg+xml text/css text/plain;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = / {
    return 302 /team-os;
  }

  location = /updates/ai-team-os/version.json {
    alias /var/www/ai-team-os/updates/VERSION_CHECK.json;
    default_type application/json;
    add_header Cache-Control "no-store, max-age=0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  location ^~ /_next/static/ {
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  location ^~ /_next/ {
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ~ ^/(?:favicon\.ico|robots\.txt|assets/|brand/|icons/) {
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    expires 1h;
  }

  location ^~ /api/team-os/ {
    limit_req zone=ai_team_os_api burst=40 nodelay;
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $ai_team_os_connection_upgrade;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_buffering off;
  }

  location ~ ^/api/(?:auth|license)(?:/|$) {
    limit_req zone=ai_team_os_api burst=20 nodelay;
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
  }

  location = /api/activate {
    limit_req zone=ai_team_os_api burst=20 nodelay;
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
  }

  location ^~ /team-os {
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $ai_team_os_connection_upgrade;
    proxy_read_timeout 180s;
  }

  location ~ ^/(?:login|register|no-access|unlock)(?:/|$) {
    proxy_pass http://ai_team_os_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
  }

  # This domain is intentionally not a second public entry to the frozen
  # knowledge, ingest, super-admin, Chat, or RAG routes in the root monolith.
  location / {
    return 404;
  }
}
